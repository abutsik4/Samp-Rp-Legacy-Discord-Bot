<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="SRP Legacy bot logo">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="60%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
  </defs>

  <rect x="14" y="14" width="228" height="228" rx="56" fill="#020617"/>
  <rect x="18" y="18" width="220" height="220" rx="52" fill="url(#g)" opacity="0.20"/>

  <!-- Bot head -->
  <rect x="56" y="88" width="144" height="104" rx="32" fill="#0f172a" opacity="0.95"/>
  <rect x="68" y="100" width="120" height="80" rx="26" fill="#111827"/>
  <circle cx="104" cy="140" r="10" fill="#e2e8f0"/>
  <circle cx="152" cy="140" r="10" fill="#e2e8f0"/>
  <rect x="118" y="152" width="20" height="8" rx="4" fill="#94a3b8"/>

  <!-- Antenna -->
  <rect x="124" y="64" width="8" height="24" rx="4" fill="#94a3b8"/>
  <circle cx="128" cy="58" r="8" fill="#22c55e"/>

  <!-- Monogram -->
  <text x="128" y="86" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="28" font-weight="900" letter-spacing="2" fill="#ffffff">SRP</text>
</svg>
